apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: rsyslog-relp-echo-server
build:
  insecureRegistries:
    - registry.local.gardener.cloud:5001
  artifacts:
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp-echo-server
      docker:
        cacheFrom:
          - local-skaffold/gardener-extension-shoot-rsyslog-relp-echo-server
  local: {}
deploy:
  helm:
    releases:
      - name: rsyslog-relp-echo-server
        namespace: rsyslog-relp-echo-server
        createNamespace: true
        wait: true
        chartPath: example/local/charts/rsyslog-relp-echo-server
        setValueTemplates:
          images.rsyslog: '{{.IMAGE_FULLY_QUALIFIED_local_skaffold_gardener_extension_shoot_rsyslog_relp_echo_server}}'
        setValues:
          service.clusterIP: 10.2.64.54
---
apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: operator
build:
  artifacts:
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp
      ko:
        dependencies:
          paths:
            - cmd/gardener-extension-shoot-rsyslog-relp
            - cmd/gardener-extension-shoot-rsyslog-relp/app
            - pkg/apis/config
            - pkg/apis/config/v1alpha1
            - pkg/apis/rsyslog
            - pkg/apis/rsyslog/install
            - pkg/apis/rsyslog/v1alpha1
            - pkg/cmd/rsyslogrelp
            - pkg/component/rsyslogrelpconfigcleaner
            - pkg/constants
            - pkg/controller/lifecycle
            - imagevector
            - imagevector/images.yaml
            - pkg/utils
            - pkg/webhook/operatingsystemconfig
            - pkg/webhook/operatingsystemconfig/resources/auditrules/00-base-config.rules
            - pkg/webhook/operatingsystemconfig/resources/auditrules/10-privilege-escalation.rules
            - pkg/webhook/operatingsystemconfig/resources/auditrules/11-privileged-special.rules
            - pkg/webhook/operatingsystemconfig/resources/auditrules/12-system-integrity.rules
            - pkg/webhook/operatingsystemconfig/resources/templates/60-audit.conf.tpl
            - pkg/webhook/operatingsystemconfig/resources/templates/scripts/configure-rsyslog.tpl.sh
            - pkg/webhook/operatingsystemconfig/resources/templates/scripts/process-rsyslog-pstats.tpl.sh
            - VERSION
        ldflags:
          - '{{.LD_FLAGS}}'
        main: ./cmd/gardener-extension-shoot-rsyslog-relp
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp-admission
      ko:
        dependencies:
          paths:
            - cmd/gardener-extension-shoot-rsyslog-relp-admission
            - cmd/gardener-extension-shoot-rsyslog-relp-admission/app
            - pkg/admission/cmd
            - pkg/admission/validator
            - pkg/apis/rsyslog
            - pkg/apis/rsyslog/install
            - pkg/apis/rsyslog/v1alpha1
            - pkg/apis/rsyslog/validation
            - pkg/constants
            - VERSION
        ldflags:
          - '{{.LD_FLAGS}}'
        main: ./cmd/gardener-extension-shoot-rsyslog-relp-admission
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp-admission/charts/application
      custom:
        buildCommand: |
          bash "$GARDENER_REPO_ROOT/dev-setup/push-helm.sh" ./charts/gardener-extension-shoot-rsyslog-relp-admission/charts/application .image.ref
        dependencies:
          paths:
            - charts/gardener-extension-shoot-rsyslog-relp-admission/charts/application
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp-admission/charts/runtime
      custom:
        buildCommand: |
          bash "$GARDENER_REPO_ROOT/dev-setup/push-helm.sh" ./charts/gardener-extension-shoot-rsyslog-relp-admission/charts/runtime .image.ref
        dependencies:
          paths:
            - charts/gardener-extension-shoot-rsyslog-relp-admission/charts/runtime
      requires:
        - image: local-skaffold/gardener-extension-shoot-rsyslog-relp-admission
          alias: IMG
    - image: local-skaffold/gardener-extension-shoot-rsyslog-relp/charts/extension
      custom:
        buildCommand: |
          bash "$GARDENER_REPO_ROOT/dev-setup/push-helm.sh" ./charts/gardener-extension-shoot-rsyslog-relp .image.ref
        dependencies:
          paths:
            - charts/gardener-extension-shoot-rsyslog-relp
      requires:
        - image: local-skaffold/gardener-extension-shoot-rsyslog-relp
          alias: IMG
  insecureRegistries:
    - registry.local.gardener.cloud:5001
manifests:
  kustomize:
    paths:
      - dev-setup/local
deploy:
  kubectl: {}
resourceSelector:
  allow:
    - groupKind: Extension.operator.gardener.cloud
      image:
        - .spec.deployment.extension.helm.ociRepository.ref
        - .spec.deployment.admission.runtimeCluster.helm.ociRepository.ref
        - .spec.deployment.admission.virtualCluster.helm.ociRepository.ref
